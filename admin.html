<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 아트라이앵글</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--teal:#2AABAA;--teal-dark:#1d8a89;--navy:#1e3a5f;--navy-dark:#122540;--white:#fff;--g100:#f0f4f4;--g200:#dde6e6;--g400:#9ab0b0;--g600:#4a6464;--g800:#1e3232;--sans:'Noto Sans KR',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--g100);color:var(--g800);min-height:100vh;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--white);padding:3rem;border-radius:8px;box-shadow:0 2px 20px rgba(0,0,0,.08);max-width:400px;width:100%;}
.login-box h1{font-size:1.3rem;color:var(--navy-dark);margin-bottom:.5rem;}
.login-box p{font-size:.88rem;color:var(--g600);margin-bottom:2rem;}
.login-box input{width:100%;padding:.9rem 1rem;border:1.5px solid var(--g200);border-radius:4px;font-size:.95rem;font-family:var(--sans);outline:none;margin-bottom:1rem;}
.login-box input:focus{border-color:var(--teal);}
.login-box button{width:100%;padding:.9rem;background:var(--teal);color:var(--white);border:none;border-radius:4px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:var(--sans);}
.admin{display:none;}
.admin-nav{background:var(--navy-dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.admin-nav h1{color:var(--white);font-size:1rem;font-weight:600;}
.admin-nav .nav-btns{display:flex;gap:.8rem;}
.admin-nav button{padding:.5rem 1.2rem;border:none;border-radius:4px;font-size:.82rem;font-family:var(--sans);cursor:pointer;font-weight:500;}
.btn-save{background:var(--teal);color:var(--white);}
.btn-preview{background:rgba(255,255,255,.15);color:var(--white);}
.btn-logout{background:none;color:var(--g400);border:1px solid rgba(255,255,255,.2)!important;}
.admin-body{max-width:900px;margin:0 auto;padding:2rem;}
.tab-bar{display:flex;gap:2px;margin-bottom:2rem;background:var(--g200);border-radius:6px;overflow:hidden;}
.tab-btn{flex:1;padding:1rem;text-align:center;font-size:.88rem;font-weight:600;cursor:pointer;background:var(--white);color:var(--g600);border:none;font-family:var(--sans);transition:all .2s;}
.tab-btn.active{background:var(--teal);color:var(--white);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.status-bar{display:flex;gap:1rem;margin-bottom:2rem;}
.status-item{flex:1;background:var(--white);padding:1.2rem 1.5rem;border-radius:6px;border-left:3px solid var(--teal);}
.status-item .label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--g400);margin-bottom:.3rem;}
.status-item .val{font-size:1rem;font-weight:600;color:var(--navy-dark);}
.status-item.error{border-left-color:#e74c3c;}.status-item.error .val{color:#e74c3c;}
.card{background:var(--white);border-radius:6px;margin-bottom:1.5rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.card-header{padding:1.2rem 1.5rem;background:var(--navy-dark);color:var(--white);font-size:.88rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.card-header .arrow{transition:transform .3s;font-size:.7rem;}
.card-header.open .arrow{transform:rotate(180deg);}
.card-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;}
.card-body.open{max-height:3000px;padding:1.5rem;}
.field{margin-bottom:1.4rem;}.field label{display:block;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:var(--g600);font-weight:600;margin-bottom:.4rem;}
.field input,.field textarea{width:100%;padding:.8rem 1rem;border:1.5px solid var(--g200);border-radius:4px;font-size:.9rem;font-family:var(--sans);outline:none;color:var(--g800);transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--teal);}
.field textarea{resize:vertical;min-height:80px;line-height:1.7;}
/* 문의 목록 */
.inq-list{display:flex;flex-direction:column;gap:1rem;}
.inq-card{background:var(--white);border:1px solid var(--g200);border-radius:6px;padding:1.5rem;border-left:3px solid var(--teal);}
.inq-card.unread{border-left-color:var(--teal);background:var(--teal-light,#e6f7f7);}
.inq-meta{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.78rem;color:var(--g400);}
.inq-name{font-weight:700;color:var(--navy-dark);font-size:.95rem;margin-bottom:.3rem;}
.inq-email{font-size:.82rem;color:var(--teal);margin-bottom:.8rem;}
.inq-msg{font-size:.9rem;color:var(--g600);line-height:1.8;white-space:pre-wrap;}
.inq-empty{text-align:center;padding:3rem;color:var(--g400);font-size:.95rem;}
.notion-test{margin-top:1rem;}.notion-test button{padding:.6rem 1.2rem;background:var(--teal);color:var(--white);border:none;border-radius:4px;font-size:.85rem;cursor:pointer;font-family:var(--sans);}
.notion-result{margin-top:1rem;padding:1rem;background:var(--g100);border-radius:4px;font-size:.82rem;color:var(--g600);display:none;max-height:250px;overflow-y:auto;line-height:1.7;white-space:pre-wrap;}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--navy);color:var(--white);padding:1rem 1.5rem;border-left:3px solid var(--teal);font-size:.88rem;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;border-radius:4px;}.toast.show{opacity:1;transform:translateY(0);}.toast.err{border-left-color:#e74c3c;}
@media(max-width:768px){.admin-body{padding:1rem;}.status-bar{flex-direction:column;}}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
<div class="login-box">
<h1>🔐 아트라이앵글 관리자</h1>
<p>사이트 콘텐츠를 수정하려면 비밀번호를 입력하세요.</p>
<input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
<button onclick="doLogin()">로그인</button>
</div>
</div>

<div class="admin" id="adminWrap">
<div class="admin-nav">
<h1>아트라이앵글 관리자</h1>
<div class="nav-btns">
<button class="btn-preview" onclick="window.open('/','_blank')">🔗 사이트 보기</button>
<button class="btn-save" id="saveBtn" onclick="saveAll()">💾 저장하기</button>
<button class="btn-logout" onclick="doLogout()">로그아웃</button>
</div>
</div>
<div class="admin-body">

<div class="tab-bar">
<button class="tab-btn active" onclick="switchTab('inquiries',this)">📬 고객 문의</button>
<button class="tab-btn" onclick="switchTab('blog',this)">📝 블로그 상태</button>
</div>

<!-- 고객 문의 탭 -->
<div class="tab-panel active" id="tab-inquiries">
<div class="status-bar">
<div class="status-item"><div class="label">전체 문의</div><div class="val" id="inqCount">로딩 중...</div></div>
<div class="status-item" id="blogStatus"><div class="label">블로그 (Notion)</div><div class="val">확인 중...</div></div>
</div>
<h3 style="font-size:1rem;font-weight:700;color:var(--navy-dark);margin-bottom:1rem;">📬 고객 문의 목록</h3>
<div id="inqList" class="inq-list"><div class="inq-empty">문의를 불러오는 중...</div></div>
</div>

<!-- 블로그 상태 탭 -->
<div class="tab-panel" id="tab-blog">
<div class="card">
<div class="card-header open" onclick="toggleCard(this)">📝 노션 블로그 진단 <span class="arrow">▼</span></div>
<div class="card-body open">
<p style="font-size:.88rem;color:var(--g600);line-height:1.8;margin-bottom:1rem;">노션 블로그 API 연결 상태를 확인합니다. 오류가 있으면 Vercel 환경변수(NOTION_TOKEN, NOTION_DB_ID)를 확인하세요.</p>
<div class="notion-test">
<button onclick="testNotion(false)">🔍 블로그 API 테스트</button>
<button onclick="testNotion(true)" style="background:var(--navy);margin-left:.5rem;">🔧 속성명 디버그</button>
</div>
<div class="notion-result" id="notionResult"></div>
</div>
</div>
</div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
let adminPw='';
function doLogin(){adminPw=document.getElementById('pwInput').value;if(!adminPw)return;document.getElementById('loginWrap').style.display='none';document.getElementById('adminWrap').style.display='block';loadInquiries();checkBlog();}
function doLogout(){adminPw='';document.getElementById('loginWrap').style.display='flex';document.getElementById('adminWrap').style.display='none';}
function toggleCard(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open');}
function switchTab(id,btn){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+id)?.classList.add('active');btn.classList.add('active');}
function showToast(m,isErr){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(isErr?' err':'');setTimeout(()=>t.className='toast',3500);}

async function loadInquiries(){
  try{
    const r=await fetch('/api/contact?pw='+encodeURIComponent(adminPw));
    const d=await r.json();
    if(d.error){document.getElementById('inqList').innerHTML='<div class="inq-empty">오류: '+d.error+'</div>';return;}
    const list=d.inquiries||[];
    document.getElementById('inqCount').textContent=list.length+'건';
    if(!list.length){document.getElementById('inqList').innerHTML='<div class="inq-empty">아직 문의가 없습니다.</div>';return;}
    document.getElementById('inqList').innerHTML=list.map(q=>{
      const dt=q.created_at?new Date(q.created_at).toLocaleString('ko-KR'):'';
      return '<div class="inq-card'+(q.is_read?'':' unread')+'"><div class="inq-meta"><span>'+dt+'</span></div><div class="inq-name">'+esc(q.name)+'</div>'+(q.email?'<div class="inq-email">'+esc(q.email)+'</div>':'')+'<div class="inq-msg">'+esc(q.message)+'</div></div>';
    }).join('');
  }catch(e){document.getElementById('inqList').innerHTML='<div class="inq-empty">네트워크 오류</div>';}
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function saveAll(){showToast('저장 기능은 콘텐츠 편집 탭에서 사용됩니다.');}

async function checkBlog(){
  const el=document.getElementById('blogStatus');
  try{const r=await fetch('/api/notion-blog');const d=await r.json();
    if(d.posts&&d.posts.length>0){el.className='status-item';el.querySelector('.val').textContent='정상 ('+d.posts.length+'개 글)';}
    else if(d.error){el.className='status-item error';el.querySelector('.val').textContent='오류';}
    else{el.querySelector('.val').textContent='연결됨 (글 0개)';}
  }catch(e){el.className='status-item error';el.querySelector('.val').textContent='API 연결 실패';}
}

async function testNotion(debug){
  const el=document.getElementById('notionResult');el.style.display='block';el.textContent='테스트 중...';
  try{const r=await fetch('/api/notion-blog'+(debug?'?debug=1':''));const d=await r.json();el.textContent=JSON.stringify(d,null,2);}
  catch(e){el.textContent='오류: '+e.message;}
}
</script>
</body>
</html>
