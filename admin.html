<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 아트라이앵글</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--teal:#2AABAA;--teal-dark:#1d8a89;--navy:#1e3a5f;--navy-dark:#122540;--white:#fff;--g100:#f0f4f4;--g200:#dde6e6;--g400:#9ab0b0;--g600:#4a6464;--g800:#1e3232;--sans:'Noto Sans KR',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--g100);color:var(--g800);min-height:100vh;}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--white);padding:3rem;border-radius:8px;box-shadow:0 2px 20px rgba(0,0,0,.08);max-width:400px;width:100%;}
.login-box h1{font-size:1.3rem;color:var(--navy-dark);margin-bottom:.5rem;}
.login-box p{font-size:.88rem;color:var(--g600);margin-bottom:2rem;}
.login-box input{width:100%;padding:.9rem 1rem;border:1.5px solid var(--g200);border-radius:4px;font-size:.95rem;font-family:var(--sans);outline:none;margin-bottom:1rem;}
.login-box input:focus{border-color:var(--teal);}
.login-box button{width:100%;padding:.9rem;background:var(--teal);color:var(--white);border:none;border-radius:4px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:var(--sans);}
.login-box button:hover{background:var(--teal-dark);}
.login-err{color:#e74c3c;font-size:.85rem;margin-top:.5rem;display:none;}

/* Admin */
.admin{display:none;}
.admin-nav{background:var(--navy-dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.admin-nav h1{color:var(--white);font-size:1rem;font-weight:600;}
.admin-nav .nav-btns{display:flex;gap:.8rem;}
.admin-nav button{padding:.5rem 1.2rem;border:none;border-radius:4px;font-size:.82rem;font-family:var(--sans);cursor:pointer;font-weight:500;}
.btn-save{background:var(--teal);color:var(--white);}.btn-save:hover{background:var(--teal-dark);}
.btn-preview{background:rgba(255,255,255,.15);color:var(--white);}.btn-preview:hover{background:rgba(255,255,255,.25);}
.btn-logout{background:none;color:var(--g400);border:1px solid rgba(255,255,255,.2)!important;}.btn-logout:hover{color:var(--white);}

.admin-body{max-width:900px;margin:0 auto;padding:2rem;}
.status-bar{display:flex;gap:1rem;margin-bottom:2rem;}
.status-item{flex:1;background:var(--white);padding:1.2rem 1.5rem;border-radius:6px;border-left:3px solid var(--teal);}
.status-item .label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--g400);margin-bottom:.3rem;}
.status-item .val{font-size:1rem;font-weight:600;color:var(--navy-dark);}
.status-item.error{border-left-color:#e74c3c;}.status-item.error .val{color:#e74c3c;}

.section-card{background:var(--white);border-radius:6px;margin-bottom:1.5rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.section-header{padding:1.2rem 1.5rem;background:var(--navy-dark);color:var(--white);font-size:.88rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.section-header .arrow{transition:transform .3s;font-size:.7rem;}
.section-header.open .arrow{transform:rotate(180deg);}
.section-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;}
.section-body.open{max-height:3000px;padding:1.5rem;}

.field{margin-bottom:1.4rem;}
.field label{display:block;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:var(--g600);font-weight:600;margin-bottom:.4rem;}
.field label span{font-weight:400;color:var(--g400);text-transform:none;letter-spacing:0;font-size:.75rem;margin-left:.5rem;}
.field input,.field textarea{width:100%;padding:.8rem 1rem;border:1.5px solid var(--g200);border-radius:4px;font-size:.9rem;font-family:var(--sans);outline:none;color:var(--g800);transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--teal);}
.field textarea{resize:vertical;min-height:80px;line-height:1.7;}
.field-hint{font-size:.75rem;color:var(--g400);margin-top:.3rem;}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--navy);color:var(--white);padding:1rem 1.5rem;border-left:3px solid var(--teal);font-size:.88rem;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;border-radius:4px;}.toast.show{opacity:1;transform:translateY(0);}
.toast.err{border-left-color:#e74c3c;}

.notion-test{margin-top:1rem;}
.notion-test button{padding:.6rem 1.2rem;background:var(--teal);color:var(--white);border:none;border-radius:4px;font-size:.85rem;cursor:pointer;font-family:var(--sans);}.notion-test button:hover{background:var(--teal-dark);}
.notion-result{margin-top:1rem;padding:1rem;background:var(--g100);border-radius:4px;font-size:.85rem;color:var(--g600);display:none;max-height:200px;overflow-y:auto;line-height:1.7;}

@media(max-width:768px){.admin-body{padding:1rem;}.status-bar{flex-direction:column;}}
</style>
</head>

<script>
let adminPw = '';

function doLogin() {
  adminPw = document.getElementById('pwInput').value;
  // 비밀번호 검증은 저장 시 서버에서 함 — 일단 UI 진입 허용
  if (!adminPw) { document.getElementById('loginErr').style.display='block'; return; }
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'block';
  loadContent();
  checkBlog();
}

function doLogout() {
  adminPw = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// 콘텐츠 불러오기
async function loadContent() {
  try {
    const r = await fetch('/api/content');
    const d = await r.json();
    if (d.content) {
      const fields = document.querySelectorAll('[data-key]');
      fields.forEach(f => {
        if (d.content[f.dataset.key] !== undefined) {
          f.value = d.content[f.dataset.key];
        }
      });
      showToast('콘텐츠 불러오기 완료');
    }
  } catch (e) {
    // 첫 사용이면 데이터 없을 수 있음 — 기본값 유지
    console.log('No saved content yet');
  }
}

// 저장
async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ 저장 중...';
  btn.disabled = true;

  const content = {};
  document.querySelectorAll('[data-key]').forEach(f => {
    content[f.dataset.key] = f.value;
  });

  try {
    const r = await fetch('/api/content', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: adminPw, content }),
    });
    const d = await r.json();
    if (d.ok) {
      showToast('✅ 저장 완료! 사이트에 반영됩니다.');
      document.getElementById('lastSaved').textContent = new Date().toLocaleString('ko-KR');
    } else {
      showToast('❌ ' + (d.error || '저장 실패'), true);
    }
  } catch (e) {
    showToast('❌ 네트워크 오류: ' + e.message, true);
  }

  btn.textContent = '💾 저장하기';
  btn.disabled = false;
}

// 블로그 상태 확인
async function checkBlog() {
  const el = document.getElementById('blogStatus');
  try {
    const r = await fetch('/api/notion-blog');
    const d = await r.json();
    if (d.posts && d.posts.length > 0) {
      el.className = 'status-item';
      el.querySelector('.val').textContent = '정상 (' + d.posts.length + '개 글)';
    } else if (d.error) {
      el.className = 'status-item error';
      el.querySelector('.val').textContent = '오류: ' + d.error;
    } else {
      el.className = 'status-item';
      el.querySelector('.val').textContent = '연결됨 (글 0개)';
    }
  } catch (e) {
    el.className = 'status-item error';
    el.querySelector('.val').textContent = 'API 연결 실패';
  }
}

async function testNotion() {
  const el = document.getElementById('notionResult');
  el.style.display = 'block';
